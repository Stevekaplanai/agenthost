<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>AgentHost</title>
<style>
  /* Direction A: chat-first multiagent gateway (the mockup Steve approved).
     Engines are in-thread teammates: every reply carries a colored attribution
     line (who answered, what it cost), a segmented control picks who answers
     next, a cost strip totals the day per engine, and the shared kanban board
     peeks above the composer. This sheet is layout + page skin only: shared
     tokens, keyframes and components come from /theme.css (served pre-auth by
     the gate, linked AFTER this sheet so its values win the cascade). The
     :root block below is a fallback so the page stays legible if that fetch
     ever fails. Chrome rules hold: blur <=12px mobile, ALWAYS a solid paint
     under glass, exactly two blurred layers here (header + composer). */
  :root {
    --base: #0B0D10; --surface: #14171B; --surface-2: #1A1E24;
    --ink: #E8ECF0; --ink-2: #9BA3AE; --ink-3: #6B7280;
    --accent: #FF6A3D; --accent-glow: rgba(255, 106, 61, .14);
    --ok: #2ECC71; --warn: #FFB020; --err: #FF5A5A;
    --claude: #FF6A3D; --hermes: #2ECC71; --codex: #6EA8FE;
    --glass-border: rgba(255, 255, 255, .16);
    --glass-border-soft: rgba(255, 255, 255, .10);
    --mono: ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --ease: cubic-bezier(.2, 0, .2, 1); --dur: 180ms; --dur-slow: 320ms;
    --hdr-h: 42px;
  }
  /* Legal brand fallback tokens. The gate injects data-brand="legal" on the body tag
     for legal deploys; theme.css's [data-brand="legal"] block (linked after
     this sheet, same specificity) wins when it loads -- this block mirrors the
     :root fallback above so a legal box stays legal-lit if that fetch fails. */
  [data-brand="legal"] {
    --base: #FBFAF7; --surface: #F3F1EA; --surface-2: #EDEAE0;
    --ink: #1C2733; --ink-2: #3D4A57; --ink-3: #5A6673;
    --accent: #16324F; --accent-glow: rgba(22, 50, 79, .10);
    --glass-border: rgba(28, 39, 51, .18);
    --glass-border-soft: rgba(28, 39, 51, .10);
  }
  * { box-sizing: border-box; }
  html { height: 100%; }
  /* --ah-kb-inset: the on-screen keyboard's occluded height, tracked below via
     visualViewport (same fix appshell.js already uses for the terminal's key
     bar). 100dvh alone doesn't reliably shrink under an open iOS keyboard --
     the layout viewport can stay tall while the keyboard just covers content
     -- so #bar sitting in normal flow needs the body itself to make room. 0
     when no keyboard is up, so this is a no-op everywhere else. */
  body { margin: 0; height: 100%; height: 100dvh; background: var(--base); color: var(--ink);
    font: 400 15px/1.45 var(--mono);
    display: flex; flex-direction: column; overflow: hidden;
    padding-bottom: var(--ah-kb-inset, 0px);
    background:
      radial-gradient(120% 60% at 50% -10%, var(--accent-glow), transparent 62%),
      var(--base); }
  ::selection { background: rgba(255, 106, 61, .30); }
  button { -webkit-tap-highlight-color: transparent; cursor: pointer; }
  button:focus-visible, a:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---- header: glass layer 1 of 2 ---- */
  #hdr { flex: none;
    min-height: calc(var(--hdr-h) + env(safe-area-inset-top));
    padding-top: env(safe-area-inset-top);
    display: flex; align-items: center; gap: 8px;
    padding-left: calc(12px + env(safe-area-inset-left));
    padding-right: calc(10px + env(safe-area-inset-right));
    background: rgba(11,13,16,.82);
    -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--glass-border-soft);
    font-weight: 600; font-size: 12px; user-select: none; }
  #brand { letter-spacing: .02em; white-space: nowrap; flex: none; }
  #brand .caret { color: var(--accent); }
  #host { color: var(--ink-2); font-weight: 400; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  /* .ah-dot language: live = green breathing, busy = amber pulse (keyframes
     come from theme.css; without it the dot is static but still colored). */
  #dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok);
    flex: none; transition: background var(--dur) var(--ease);
    animation: ah-breathe 3.2s var(--ease) infinite; }
  #dot.busy { background: var(--warn); animation: ah-pulse 1.1s var(--ease) infinite; }
  /* With 5+ apps the pills can outgrow a phone header: the bar shrinks and
     scrolls horizontally instead of clipping pills (mirrors #ah-tabs). */
  #tabs { margin-left: auto; display: flex; border: 1px solid var(--glass-border);
    border-radius: 999px; overflow-x: auto; overflow-y: hidden; flex: 0 1 auto; min-width: 0; }
  #tabs a { padding: 4px 13px; font: 600 11px var(--mono); text-decoration: none;
    white-space: nowrap; flex: none;
    color: var(--ink); opacity: .6; transition: opacity var(--dur) var(--ease); }
  #tabs a:hover { opacity: .9; }
  #tabs a.on { background: var(--accent-glow); color: var(--accent); opacity: 1; }
  #bell { flex: none; width: 30px; height: 26px; margin-left: 4px; border-radius: 8px;
    padding: 0; border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.05);
    color: var(--ink); font: 13px var(--mono);
    transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease),
      opacity var(--dur) var(--ease); }
  #bell.on { color: var(--accent); border-color: rgba(255,106,61,.5); }
  #bell.off { opacity: .45; }

  /* ---- phone-width fit (Steve: "top of the menu is cut off on the right").
     The tab nav is PRIMARY navigation: it must be fully visible and tappable
     at every width. Host label goes first, paddings and tab pills tighten,
     the brand may ellipsize -- the tabs never clip, and there is never a
     horizontal page scroll. Mirrors appshell.js's terminal-page header. */
  @media (max-width: 620px) { #host { display: none; } }
  @media (max-width: 520px) {
    #hdr { gap: 6px; padding-left: calc(10px + env(safe-area-inset-left));
      padding-right: calc(8px + env(safe-area-inset-right)); }
    #brand { font-size: 11px; flex: 0 1 auto; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; }
    #bell { margin-left: 0; width: 28px; }
    #tabs a { padding: 4px 9px; font-size: 10px; }
  }
  @media (max-width: 385px) { #hdr { gap: 5px; } #tabs a { padding: 4px 7px; } }

  /* ---- cost strip: per-engine spend today (GET /usage). Collapsed = one
     quiet row with a stacked mini bar; tap to expand per-engine rows. The
     panel may SHRINK under viewport pressure (its body scrolls internally) so
     the composer can never be pushed offscreen; safe-area margins because the
     page opts into viewport-fit=cover. ---- */
  #cost { flex: 0 1 auto; min-height: 0; display: flex; flex-direction: column;
    margin: 8px calc(12px + env(safe-area-inset-right)) 0 calc(12px + env(safe-area-inset-left));
    background: linear-gradient(180deg, var(--surface) 0%, rgba(20,23,27,.6) 100%);
    border: 1px solid rgba(255,255,255,.06); border-radius: 12px; overflow: hidden; }
  #costhead { flex: none; display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 8px 12px; border: 0; background: transparent; color: var(--ink);
    font: inherit; text-align: left; }
  #costhead .ctitle { font: 600 10px var(--mono); letter-spacing: .12em;
    text-transform: uppercase; color: var(--ink-3); white-space: nowrap; }
  #costhead .cmini { flex: 1; display: flex; gap: 3px; height: 4px; min-width: 30px; }
  #costhead .cmini span { border-radius: 999px; }
  #costhead .ctotal { font: 600 12px var(--mono); color: var(--ink); white-space: nowrap; }
  #costhead .chev { color: var(--ink-3); font: 10px var(--mono); }
  #costbody { padding: 0 12px 10px; border-top: 1px solid rgba(255,255,255,.05);
    max-height: 180px; min-height: 0; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.16) transparent; }
  .erow { display: grid; grid-template-columns: auto 1fr auto; column-gap: 10px;
    align-items: center; padding: 8px 0 4px; }
  .erow + .erow { border-top: 1px solid rgba(255,255,255,.03); }
  .erow .edot { width: 8px; height: 8px; border-radius: 999px; }
  .erow .ename { font: 400 12px var(--mono); color: var(--ink); }
  .erow .eacct { font: 400 10px var(--mono); color: var(--ink-3); margin-left: 6px; }
  .erow .efig { text-align: right; font-family: var(--mono); }
  .erow .efig .usd { font-size: 12px; color: var(--ink); display: block; }
  .erow .efig .tok { font-size: 10.5px; color: var(--ink-3); display: block; }
  .erow .ebar { grid-column: 1 / -1; height: 4px; border-radius: 999px;
    background: rgba(255,255,255,.06); margin-top: 6px; overflow: hidden; }
  .erow .ebar i { display: block; height: 100%; border-radius: 999px; }
  #costempty { padding: 8px 0 2px; font: 400 11px var(--mono); color: var(--ink-3); }

  /* ---- thread ---- */
  /* the thread yields space to expanded panels but keeps a readable floor;
     the panels' bodies scroll internally past that point (see #cost/#board),
     so the composer can never be pushed below the fold. */
  #threadwrap { flex: 1 1 auto; min-height: 96px; position: relative; display: flex; }
  #thread { flex: 1; overflow-y: auto;
    -webkit-overflow-scrolling: touch; overscroll-behavior: contain; touch-action: pan-y;
    padding: 14px 12px; display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.16) transparent; }
  #thread::-webkit-scrollbar { width: 5px; }
  #thread::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 999px; }
  .msg { max-width: 86%; padding: 10px 13px; border-radius: 14px; white-space: pre-wrap;
    word-break: break-word; font: 400 14px/1.5 var(--sans); position: relative;
    animation: ah-rise var(--dur-slow) var(--ease) both; }
  .me { align-self: flex-end; color: var(--ink);
    background: var(--surface-2);
    border: 1px solid rgba(255,255,255,.07);
    border-bottom-right-radius: 5px; }
  .agent { align-self: flex-start; border-bottom-left-radius: 5px;
    background: radial-gradient(140% 100% at 50% 0%, rgba(255,255,255,.06), rgba(255,255,255,.01) 55%), var(--surface);
    border: 1px solid rgba(255,255,255,.09);
    box-shadow: inset 0 1px 0 var(--glass-border-soft); }
  .agent.err { border-color: rgba(255,90,90,.55); } /* --err @ .55 */
  /* in-thread attribution: who answered, what it cost. A SIBLING of the reply
     bubble, never inside it -- the bubble's textContent stays pure model
     output (the UI tests and the fence renderer both rely on that). */
  .attr { align-self: flex-start; display: flex; align-items: center; gap: 6px;
    font: 400 10px var(--mono); letter-spacing: .03em; color: var(--ink-3);
    padding-left: 4px; margin-bottom: -5px;
    animation: ah-rise var(--dur-slow) var(--ease) both; }
  .attr .d { width: 6px; height: 6px; border-radius: 999px; background: var(--ink-3); }
  .attr .cost { opacity: .8; }
  /* handoff chip: an agent reply that @mentions another engine gets a one-tap
     "hand off" action under the bubble (explicit routing -- the user approves
     every handoff). A <button> sibling, never part of the bubble. */
  .handoff { align-self: flex-start; margin: -4px 0 0 4px;
    border: 1px solid rgba(255,255,255,.12); border-radius: 999px;
    padding: 5px 12px; background: var(--surface); color: var(--ink-2);
    font: 600 11px var(--mono);
    transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease); }
  .handoff:hover { color: var(--ink); }
  /* streaming = a shimmer sweep across the bubble + the blinking caret */
  .agent.streaming::before { content: ""; position: absolute; inset: 0;
    border-radius: inherit; pointer-events: none;
    background-image: linear-gradient(100deg, transparent 30%, rgba(255,255,255,.07) 50%, transparent 70%);
    background-size: 200% 100%; animation: ah-shimmer 1.6s linear infinite; }
  .agent.streaming::after { content: "▎"; color: var(--accent);
    animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  /* fenced ``` blocks inside a bubble (DOM built with textContent only --
     see renderMsg(); no model output ever touches innerHTML) */
  .msg pre.code { margin: 8px 0 2px; padding: 9px 11px; border-radius: 10px;
    background: var(--surface-2); border: 1px solid var(--glass-border-soft);
    overflow-x: auto; white-space: pre; font: 400 12.5px/1.5 var(--mono);
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.16) transparent; }
  .msg pre.code::-webkit-scrollbar { height: 4px; }
  .msg pre.code::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 999px; }
  .msg pre.code[data-lang]::before { content: attr(data-lang); display: block;
    font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3); margin-bottom: 6px; }
  .me pre.code { background: rgba(11,13,16,.65); border-color: rgba(255,255,255,.08);
    color: var(--ink); }
  /* a message sent while a run is busy stays a NORMAL user bubble; this small
     tag says it's waiting its turn and vanishes the moment its run starts */
  .me .qchip { display: block; margin-top: 6px; text-align: right;
    font: 700 9.5px var(--mono); letter-spacing: .08em;
    text-transform: uppercase; color: var(--ink-2); }
  .stamp { align-self: center; color: var(--ink-3); font-size: 11px; padding: 2px;
    font-family: var(--mono); }
  .hint { align-self: center; color: var(--ink-3); font-size: 12px; padding: 4px;
    text-align: center; max-width: 90%; font-family: var(--mono); }
  /* server "status" SSE events (message queued behind a busy slot): a quiet
     system line, deliberately NOT a bubble; removed when streaming starts. */
  .sys { align-self: center; color: var(--ink-3); font-size: 12px; font-style: italic;
    padding: 2px 8px; text-align: center; max-width: 90%; font-family: var(--mono);
    animation: ah-rise var(--dur-slow) var(--ease) both; }

  /* ---- "new messages" pill: only while streaming AND scrolled away ---- */
  #jump { position: absolute; left: 50%; bottom: 12px; z-index: 15;
    transform: translateX(-50%) translateY(8px);
    border: 1px solid var(--glass-border); border-radius: 999px;
    padding: 7px 14px; background: var(--surface-2); color: var(--accent);
    font: 600 12px var(--mono); box-shadow: 0 10px 26px -8px rgba(0,0,0,.7);
    opacity: 0; pointer-events: none;
    transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease); }
  #jump.show { opacity: 1; pointer-events: auto; transform: translateX(-50%); }
  #jump:active { transform: translateX(-50%) scale(.96); }

  /* ---- board peek: the shared kanban (GET /board) above the composer.
     Collapsed = one slim row; tap to expand columns + quick-add. Shrinkable
     like #cost so the composer always stays reachable; safe-area margins
     because the page opts into viewport-fit=cover. ---- */
  #board { flex: 0 1 auto; min-height: 0; display: flex; flex-direction: column;
    margin: 6px calc(12px + env(safe-area-inset-right)) 0 calc(12px + env(safe-area-inset-left));
    background: var(--surface); border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px; overflow: hidden; }
  #boardhead { flex: none; display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 8px 12px; border: 0; background: transparent; color: var(--ink);
    font: inherit; text-align: left; }
  #boardhead .btitle { font: 600 10px var(--mono); letter-spacing: .1em;
    text-transform: uppercase; color: var(--ink-3); }
  #boardhead .btitle b { color: var(--ink); font-weight: 600; }
  #boardhead .bcount { margin-left: auto; font: 400 10px var(--mono); color: var(--ink-3); }
  #boardhead .chev { color: var(--ink-3); font: 10px var(--mono); }
  #boardbody { padding: 2px 12px 10px; border-top: 1px solid rgba(255,255,255,.05);
    min-height: 0; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.16) transparent; }
  #cols { display: flex; gap: 7px; max-height: 180px; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.16) transparent; }
  .col { flex: 1; min-width: 0; }
  .col-h { font: 600 9px var(--mono); letter-spacing: .06em; color: var(--ink-3);
    text-transform: uppercase; margin: 8px 0 6px; display: flex; gap: 5px; }
  .col-h .n { color: var(--ink); }
  .bcard { background: var(--surface-2); border: 1px solid rgba(255,255,255,.05);
    border-radius: 8px; padding: 7px 8px; margin-bottom: 6px;
    border-left: 2px solid var(--ink-3); }
  .bcard .t { font: 400 11px/1.35 var(--sans); color: var(--ink);
    word-break: break-word; }
  .bcard .o { font: 400 8.5px var(--mono); color: var(--ink-3);
    text-transform: uppercase; margin-top: 4px; display: block; }
  #addrow { display: flex; gap: 6px; margin-top: 8px; }
  #addtitle { flex: 1; min-width: 0; background: var(--base);
    border: 1px solid rgba(255,255,255,.1); border-radius: 9px; color: var(--ink);
    padding: 7px 10px; font: 400 12px var(--sans); outline: none; }
  #addtitle:focus { border-color: var(--accent); }
  #addgo { flex: none; width: 32px; border: 1px solid rgba(255,255,255,.12);
    border-radius: 9px; background: var(--surface-2); color: var(--ink);
    font: 600 14px var(--mono); }
  #boardnote { font: 400 10.5px var(--mono); color: var(--ink-3); margin-top: 6px; }
  #boardnote.err { color: var(--err); }

  /* ---- composer: glass layer 2 of 2. Engine selector + input + route hint ---- */
  #bar { flex: none; display: flex; flex-direction: column; gap: 8px;
    padding: 8px calc(10px + env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));
    background: rgba(20,23,27,.86);
    -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,.12); }
  #seg { display: flex; gap: 4px; padding: 4px; background: var(--base);
    border: 1px solid rgba(255,255,255,.07); border-radius: 999px; }
  #seg button { flex: 1; display: flex; align-items: center; justify-content: center;
    gap: 6px; font: 600 12px var(--mono); letter-spacing: .02em;
    padding: 7px 6px; border-radius: 999px; border: 0;
    background: transparent; color: var(--ink-3);
    transition: background var(--dur) var(--ease), color var(--dur) var(--ease),
      box-shadow var(--dur) var(--ease); }
  #seg button .sd { width: 7px; height: 7px; border-radius: 999px; flex: none; }
  #seg button[data-eng="claude"] .sd { background: var(--claude); }
  #seg button[data-eng="hermes"] .sd { background: var(--hermes); }
  #seg button[data-eng="codex"]  .sd { background: var(--codex); }
  #seg button.active { background: var(--surface-2); color: var(--ink); }
  #seg button.active[data-eng="claude"] { box-shadow: inset 0 0 0 1px rgba(255,106,61,.45), 0 0 12px rgba(255,106,61,.10); }
  #seg button.active[data-eng="hermes"] { box-shadow: inset 0 0 0 1px rgba(46,204,113,.45), 0 0 12px rgba(46,204,113,.10); }
  #seg button.active[data-eng="codex"]  { box-shadow: inset 0 0 0 1px rgba(110,168,254,.45), 0 0 12px rgba(110,168,254,.10); }
  #inrow { display: flex; gap: 8px; align-items: flex-end; }
  #input { flex: 1; resize: none; height: 44px; max-height: 110px; background: var(--base);
    border: 1px solid rgba(255,255,255,.14); border-radius: 18px; color: var(--ink);
    padding: 10px 14px; font: 400 16px/1.4 var(--sans); outline: none;
    transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease); }
  #input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  #input::placeholder { color: var(--ink-3); white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; } /* one quiet line, never a clipped wrap */
  #send { flex: none; width: 44px; height: 44px; border: 0; border-radius: 50%;
    color: var(--base); font: 700 18px var(--mono);
    background: linear-gradient(180deg, rgba(255,255,255,.3), rgba(255,255,255,0) 55%), var(--accent);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.55), inset 0 -1px 1px rgba(0,0,0,.18);
    transition: box-shadow var(--dur) var(--ease), transform var(--dur) var(--ease),
      opacity var(--dur) var(--ease); }
  #send:hover:not(:disabled) { box-shadow: inset 0 1px 0 rgba(255,255,255,.55),
    inset 0 -1px 1px rgba(0,0,0,.18), 0 6px 22px -6px var(--accent); }
  #send:active:not(:disabled) { transform: scale(.94); }
  #send:disabled { opacity: .35; cursor: default; }
  /* data-slot="composer-extras": mic button (voice, tier 2) lands here */
  #mic { flex: none; width: 44px; height: 44px; border-radius: 50%; padding: 0;
    border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.05);
    color: var(--ink); font: 18px var(--mono);
    transition: background var(--dur) var(--ease), color var(--dur) var(--ease),
      border-color var(--dur) var(--ease); }
  #mic.on { background: var(--accent); color: var(--base); border-color: var(--accent);
    animation: mic-pulse 1.3s var(--ease) infinite; }
  @keyframes mic-pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,106,61,.45); }
    70% { box-shadow: 0 0 0 14px rgba(255,106,61,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,106,61,0); } }
  #routehint { display: flex; align-items: center; justify-content: center; gap: 6px;
    font: 400 9.5px var(--mono); letter-spacing: .03em; color: var(--ink-3);
    user-select: none; }
  #routehint b { font-weight: 600; }
  #routehint code { background: rgba(0,0,0,.3); padding: 1px 5px; border-radius: 4px;
    font: 400 9px var(--mono); color: var(--codex); }

  /* ---- tracked-changes redline card: a ```redline fenced block in an agent
     message renders as a card -- header tag line, then mono body where
     [-deleted-] is struck red and {+inserted+} is green. Both brands; the
     legal overrides below relight it to the lawyer palette. DOM is built with
     textContent only (see redlineCard()); model output never hits innerHTML. */
  .msg .redline { margin: 8px 0 2px; border-radius: 12px; overflow: hidden;
    background: var(--surface-2); border: 1px solid var(--glass-border);
    color: var(--ink); /* explicit: a card inside .me must not inherit the
      bubble's on-accent text color (white text on the card's light paint) */
    font: 400 12.5px/1.6 var(--mono); }
  .redline-h { padding: 7px 11px; font-weight: 600; font-size: 11px;
    letter-spacing: .04em; color: var(--ink-2);
    background: rgba(255,255,255,.04);
    border-bottom: 1px solid var(--glass-border-soft); }
  .redline-b { margin: 0; padding: 9px 11px; white-space: pre-wrap;
    word-break: break-word; overflow-x: auto; font: inherit;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.16) transparent; }
  .rl-del { color: #FF8A8A; background: rgba(255,90,90,.14);
    text-decoration: line-through; text-decoration-thickness: 1px;
    border-radius: 3px; padding: 0 2px; }
  .rl-ins { color: #7BE0A2; background: rgba(46,204,113,.16);
    border-radius: 3px; padding: 0 2px; }

  /* ---- legal skin: page-local touches the shared tokens can't express
     (white-on-navy user bubbles, bronze highlights, serif wordmark). The bulk
     of the relight rides the [data-brand="legal"] token overrides above /
     in theme.css via the var() names. Multiagent chrome (engine selector,
     cost strip, board peek, route hint) is a gateway feature -- a legal box
     is single-engine Claude, so it never renders. ---- */
  [data-brand="legal"] #cost, [data-brand="legal"] #board,
  [data-brand="legal"] #seg, [data-brand="legal"] #routehint,
  [data-brand="legal"] .attr, [data-brand="legal"] .handoff { display: none; }
  [data-brand="legal"] #hdr { background: rgba(251,250,247,.88); }
  [data-brand="legal"] #brand { font-family: Georgia, 'Times New Roman', serif;
    letter-spacing: .01em; }
  [data-brand="legal"] ::selection { background: rgba(140,106,63,.25); }
  [data-brand="legal"] .me { background: #16324F; color: #FFFFFF;
    box-shadow: none; }
  [data-brand="legal"] .me pre.code { background: rgba(15,36,56,.6);
    border-color: rgba(255,255,255,.16); color: #F3F1EA; }
  [data-brand="legal"] .me .qchip { color: #F0E9DD; opacity: .8; }
  [data-brand="legal"] .agent { background: #F3F1EA; color: #1C2733;
    border-color: #E4E0D6; box-shadow: none; }
  [data-brand="legal"] .agent.streaming::before {
    background-image: linear-gradient(100deg, transparent 30%, rgba(28,39,51,.05) 50%, transparent 70%); }
  [data-brand="legal"] #bar { background: rgba(251,250,247,.9);
    border-top-color: #E4E0D6; }
  [data-brand="legal"] #input { background: #FFFFFF; border-color: #E4E0D6; }
  [data-brand="legal"] #send { color: #FFFFFF; }
  [data-brand="legal"] #bell { border-color: #E4E0D6; background: #FFFFFF; }
  [data-brand="legal"] #mic { border-color: #E4E0D6; background: #FFFFFF; }
  [data-brand="legal"] .msg .redline { background: #FFFFFF; border-color: #E4E0D6; }
  [data-brand="legal"] .redline-h { color: #8C6A3F; background: #F3F1EA;
    border-bottom-color: #E4E0D6; font-size: 12px; letter-spacing: .02em;
    font-family: Georgia, 'Times New Roman', serif; }
  [data-brand="legal"] .rl-del { color: #B0392F; background: #F5E4E2; }
  [data-brand="legal"] .rl-ins { color: #2F7D5B; background: #E7F0EA; }

  /* desktop: center a readable column; the chrome stays full-bleed */
  @media (min-width: 900px) {
    #thread { padding-left: max(12px, calc(50vw - 380px));
      padding-right: max(12px, calc(50vw - 380px)); }
    #bar { padding-left: max(10px, calc(50vw - 380px));
      padding-right: max(10px, calc(50vw - 380px)); }
    #cost, #board { margin-left: max(12px, calc(50vw - 380px));
      margin-right: max(12px, calc(50vw - 380px)); }
  }

  /* keep state, drop theatrics */
  @media (prefers-reduced-motion: reduce) {
    .msg, .sys, .attr, #dot, #mic.on, .agent.streaming::before, .agent.streaming::after {
      animation: none !important; }
    #jump, #send, #mic, #input, #tabs a, #bell, #seg button { transition: none; }
  }
</style>
<link rel="stylesheet" href="/theme.css">
<script defer src="/agenthost-nav.js?v=1"></script>
</head>
<body>
<div id="hdr">
  <span id="dot"></span>
  <span id="brand">agenthost <span class="caret">▎</span></span>
  <span id="host"></span>
  <button id="bell" type="button" aria-label="enable notifications">🔔</button>
  <nav id="tabs" data-slot="nav"></nav>
</div>
<div id="cost" hidden>
  <button id="costhead" type="button" aria-label="toggle spend details">
    <span class="ctitle">spend · today</span>
    <span class="cmini"></span>
    <span class="ctotal"></span>
    <span class="chev">▾</span>
  </button>
  <div id="costbody" hidden></div>
</div>
<div id="threadwrap">
  <div id="thread"><div class="hint">one thread, three engines — claude, hermes &amp; codex share the box and the brain</div></div>
  <button id="jump" type="button" aria-label="scroll to newest messages">new messages ↓</button>
</div>
<div id="board" hidden>
  <button id="boardhead" type="button" aria-label="toggle task board">
    <span class="btitle"><b>task board</b> · shared</span>
    <span class="bcount"></span>
    <span class="chev">▾</span>
  </button>
  <div id="boardbody" hidden>
    <div id="cols"></div>
    <div id="addrow">
      <input id="addtitle" type="text" maxlength="200" placeholder="new task for the board…" enterkeyhint="done">
      <button id="addgo" type="button" aria-label="add task">+</button>
    </div>
    <div id="boardnote"></div>
  </div>
</div>
<div id="bar">
  <div id="seg" role="group" aria-label="engine">
    <button type="button" data-eng="claude"><span class="sd"></span>Claude</button>
    <button type="button" data-eng="hermes"><span class="sd"></span>Hermes</button>
    <button type="button" data-eng="codex"><span class="sd"></span>Codex</button>
  </div>
  <div id="inrow" data-slot="composer-extras">
    <textarea id="input" rows="1" placeholder="tell your agent something…" enterkeyhint="send"></textarea>
    <button id="mic" type="button" aria-label="voice input">🎤</button>
    <button id="send" type="button" aria-label="send">↑</button>
  </div>
  <div id="routehint"></div>
</div>
<script>
(function () {
  "use strict";
  var thread = document.getElementById("thread");
  var input = document.getElementById("input");
  var send = document.getElementById("send");
  var dot = document.getElementById("dot");
  document.getElementById("host").textContent = location.hostname;

  // Brand: the gate injects data-brand="legal" on <body> for legal deploys.
  // Lawyer-facing wordmark; the visual relight is pure CSS (tokens + the
  // [data-brand="legal"] rules above). A legal box is single-engine Claude:
  // the multiagent chrome stays hidden AND its network calls never fire, so
  // the page behaves exactly like the pre-gateway build there.
  var LEGAL = document.body.getAttribute("data-brand") === "legal";
  if (LEGAL) {
    document.getElementById("brand").textContent = "Your private workspace";
    // The empty-thread hint ships with gateway copy (three engines); a legal
    // box is single-engine Claude, so restore the pre-gateway wording.
    var legalHint = thread.querySelector(".hint");
    if (legalHint) legalHint.textContent = "messages run on your box via claude -p; the tmux session is untouched";
  }

  // ---- engines: the roster the gate's router knows (gate.js ENGINES). ----
  var ENGINES = {
    claude: { name: "Claude", color: "var(--claude)", acct: "claude -p · sub" },
    hermes: { name: "Hermes", color: "var(--hermes)", acct: "GLM-5.2 · ollama" },
    codex:  { name: "Codex",  color: "var(--codex)",  acct: "codex · ChatGPT" },
  };
  var ENGINE_IDS = ["claude", "hermes", "codex"];
  var ENG_KEY = "agenthost_engine_" + location.hostname;
  var eng = "claude";
  try { if (ENGINES[localStorage.getItem(ENG_KEY)]) eng = localStorage.getItem(ENG_KEY); } catch (e) {}
  var seg = document.getElementById("seg");
  var routehint = document.getElementById("routehint");
  function setEngine(id, fromTap) {
    if (!ENGINES[id]) return;
    eng = id;
    try { localStorage.setItem(ENG_KEY, id); } catch (e) {}
    Array.prototype.forEach.call(seg.querySelectorAll("button"), function (b) {
      b.classList.toggle("active", b.getAttribute("data-eng") === id);
    });
    if (!LEGAL) input.placeholder = "Message " + ENGINES[id].name + "…";
    // route hint: built with createElement/textContent only (static strings,
    // but the no-innerHTML rule is easier to keep than to audit).
    routehint.textContent = "";
    routehint.appendChild(document.createTextNode("answering with "));
    var b = document.createElement("b");
    b.textContent = ENGINES[id].name;
    b.style.color = ENGINES[id].color;
    routehint.appendChild(b);
    routehint.appendChild(document.createTextNode(" · type "));
    var c = document.createElement("code");
    c.textContent = "@" + (id === "codex" ? "claude" : "codex");
    routehint.appendChild(c);
    routehint.appendChild(document.createTextNode(" to route one turn"));
    if (fromTap) input.focus();
  }
  if (!LEGAL) {
    setEngine(eng);
    seg.addEventListener("click", function (e) {
      var b = e.target.closest("button[data-eng]");
      if (b) setEngine(b.getAttribute("data-eng"), true);
    });
  }

  var KEY = "agenthost_chat_" + location.hostname;
  var history = [];
  try { history = JSON.parse(localStorage.getItem(KEY) || "[]"); } catch (e) {}
  // Replies are saved when they FINISH, so a message sent while a run was
  // busy sits before that run's reply in save order. Render by timestamp
  // (replies are stamped with their turn-START time below) to restore the
  // interleaved order the live view had.
  history.slice().sort(function (a, b) { return (a.at || 0) - (b.at || 0); })
    .forEach(function (m) {
      var el = bubble(m.role, m.text, m.err, m.at, m.eng, m.usage);
      // Only entries that RECORDED their engine get a handoff chip on restore:
      // pre-gateway history has no eng, so the self-mention guard inside
      // maybeHandoff could never fire for it (undefined !== "claude").
      if (m.role === "agent" && m.eng) maybeHandoff(el, m.text, m.eng);
    });
  scrollDown(true);

  function save(role, text, err, at, engId, usage) {
    var entry = { role: role, text: text, err: !!err, at: at || Date.now() };
    if (engId) entry.eng = engId;
    if (usage) entry.usage = usage;
    history.push(entry);
    if (history.length > 200) history = history.slice(-200);
    try { localStorage.setItem(KEY, JSON.stringify(history)); } catch (e) {}
  }

  function stampText(at) {
    var d = new Date(at);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function fmtTok(n) {
    if (!Number.isFinite(n) || n <= 0) return "0";
    if (n < 1000) return String(n);
    if (n < 1e6) return (n / 1e3).toFixed(n < 1e4 ? 1 : 0) + "K";
    return (n / 1e6).toFixed(1) + "M";
  }
  function fmtUsd(c) {
    if (!Number.isFinite(c) || c <= 0) return "";
    return c < 0.005 ? "<$0.01" : "$" + c.toFixed(2);
  }

  // Tracked-changes redline: a ```redline fenced block renders as a card.
  // Markers are EXACTLY [-deleted-] and {+inserted+}; everything else is
  // plain text. parseRedline is a pure tokenizer (exposed on window for the
  // UI rig's unit tests); redlineCard builds DOM with textContent ONLY --
  // raw model output never reaches innerHTML.
  var RL_MARK = /\[-([\s\S]*?)-\]|\{\+([\s\S]*?)\+\}/g;
  function parseRedline(text) {
    var out = [], last = 0, m;
    RL_MARK.lastIndex = 0;
    while ((m = RL_MARK.exec(text))) {
      if (m.index > last) out.push({ t: "txt", s: text.slice(last, m.index) });
      out.push(m[1] != null ? { t: "del", s: m[1] } : { t: "ins", s: m[2] });
      last = m.index + m[0].length;
    }
    if (last < text.length) out.push({ t: "txt", s: text.slice(last) });
    return out;
  }
  window.__parseRedline = parseRedline; // test seam (rig unit tests)
  function redlineCard(body) {
    var card = document.createElement("div");
    card.className = "redline";
    // Fallback: a redline block with NO markers is just a plain mono card.
    if (!RL_MARK.test(body)) {
      RL_MARK.lastIndex = 0;
      var plain = document.createElement("pre");
      plain.className = "redline-b";
      plain.textContent = body;
      card.appendChild(plain);
      return card;
    }
    RL_MARK.lastIndex = 0;
    // First line of the block is the header tag line
    // (e.g. "§4.2 Indemnification — tracked changes").
    var nl = body.indexOf("\n");
    var head = nl === -1 ? "" : body.slice(0, nl);
    var rest = nl === -1 ? body : body.slice(nl + 1);
    if (head) {
      var h = document.createElement("div");
      h.className = "redline-h";
      h.textContent = head;
      card.appendChild(h);
    }
    var b = document.createElement("pre");
    b.className = "redline-b";
    parseRedline(rest).forEach(function (p) {
      if (p.t === "txt") { b.appendChild(document.createTextNode(p.s)); return; }
      var s = document.createElement("span");
      s.className = p.t === "del" ? "rl-del" : "rl-ins";
      s.textContent = p.s;
      b.appendChild(s);
    });
    card.appendChild(b);
    return card;
  }

  // Fence-aware bubble renderer. Plain text goes straight through textContent;
  // text containing ``` fences is rebuilt as text nodes + <pre class="code">
  // children (or a redline card for ```redline fences) -- still textContent-
  // only end to end, so raw model output can never reach innerHTML. An
  // unclosed fence (mid-stream) renders as an open code panel, which is
  // exactly what you want while code is still arriving.
  function renderMsg(el, text) {
    if (text.indexOf("```") === -1) { el.textContent = text; return; }
    el.textContent = "";
    var parts = text.split("```");
    for (var i = 0; i < parts.length; i++) {
      if (i % 2 === 0) {
        if (parts[i]) el.appendChild(document.createTextNode(parts[i]));
      } else {
        var body = parts[i];
        var lang = "";
        var m = /^([A-Za-z0-9_+.-]{1,24})?[ \t]*\n([\s\S]*)$/.exec(body);
        if (m) {
          if (m[1]) lang = m[1].toLowerCase();
          body = m[2];
        }
        body = body.replace(/\n$/, "");
        if (lang === "redline") {
          el.appendChild(redlineCard(body));
        } else {
          var pre = document.createElement("pre");
          pre.className = "code";
          if (lang) pre.setAttribute("data-lang", lang);
          pre.textContent = body;
          el.appendChild(pre);
        }
      }
    }
  }

  // In-thread attribution (Direction A): a small "who answered · what it cost"
  // line ABOVE each reply. A sibling of the bubble, never inside it, so the
  // bubble's textContent stays pure model output.
  function attrLine(engId) {
    var e = ENGINES[engId];
    if (!e) return null;
    var a = document.createElement("div");
    a.className = "attr";
    var d = document.createElement("span");
    d.className = "d";
    d.style.background = e.color;
    a.appendChild(d);
    a.appendChild(document.createTextNode(e.name));
    var c = document.createElement("span");
    c.className = "cost";
    a.appendChild(c);
    return a;
  }
  function attrCost(a, usage) {
    if (!a || !usage) return;
    var tok = (usage.in || 0) + (usage.out || 0);
    if (!tok) return;
    var s = " · " + fmtTok(tok) + " tok";
    var usd = fmtUsd(usage.cost);
    if (usd) s += " · " + usd;
    a.querySelector(".cost").textContent = s;
  }

  // Handoff chip (explicit routing v1): a reply that @mentions ANOTHER engine
  // gets a one-tap "hand off" action under the bubble -- it switches the
  // selector so the next message goes to the suggested engine. The user
  // stays in charge of every handoff; nothing dispatches on its own.
  function maybeHandoff(el, text, fromEng) {
    if (LEGAL || !el || !text) return;
    var m = /@(claude|hermes|codex)\b/i.exec(text);
    if (!m) return;
    var to = m[1].toLowerCase();
    if (to === fromEng) return;
    var b = document.createElement("button");
    b.type = "button";
    b.className = "handoff";
    b.textContent = "↪ hand this to " + ENGINES[to].name;
    b.style.borderColor = ENGINES[to].color;
    b.addEventListener("click", function () { setEngine(to, true); });
    el.insertAdjacentElement("afterend", b);
  }

  // A quiet timestamp between messages more than 10 minutes apart.
  var lastAt = 0;
  function bubble(role, text, err, at, engId, usage) {
    at = at || Date.now();
    if (at - lastAt > 10 * 60 * 1000) {
      var s = document.createElement("div");
      s.className = "stamp";
      s.textContent = stampText(at);
      thread.appendChild(s);
    }
    lastAt = at;
    var el = document.createElement("div");
    el.className = "msg " + (role === "me" ? "me" : "agent") + (err ? " err" : "");
    renderMsg(el, text);
    if (role === "agent" && engId && !LEGAL) {
      var a = attrLine(engId);
      if (a) { attrCost(a, usage); thread.appendChild(a); el._attr = a; }
    }
    thread.appendChild(el);
    return el;
  }

  // Only pull the view to the bottom when you're ALREADY near it. If you've
  // scrolled up to read an earlier error, streaming chunks won't yank you back
  // down mid-read. "Near" = within ~120px of the bottom.
  //
  // The distance check alone isn't enough during active streaming: SSE chunks
  // can call scrollDown() every ~60-100ms, and a touch-drag gesture takes a
  // few hundred ms to carry you out of the 120px zone -- so a chunk lands
  // mid-drag, sees you're still "near bottom", and snaps back before your
  // finger has moved far enough to escape. Net effect: you can't scroll up at
  // all while a response is streaming. Fix: track a touch/wheel gesture as
  // explicit user intent and suspend auto-follow for its whole duration, not
  // just point-in-time distance -- exactly how every real chat app behaves.
  var userAwayFromBottom = false;
  function nearBottom() { return thread.scrollHeight - thread.scrollTop - thread.clientHeight < 120; }
  function scrollDown(force) {
    if (force) { userAwayFromBottom = false; thread.scrollTop = thread.scrollHeight; return; }
    if (userAwayFromBottom) return;
    if (nearBottom()) thread.scrollTop = thread.scrollHeight;
  }
  thread.addEventListener("touchstart", function () { userAwayFromBottom = true; }, { passive: true });
  function reassessAway() { userAwayFromBottom = !nearBottom(); }
  thread.addEventListener("touchend", reassessAway, { passive: true });
  thread.addEventListener("wheel", reassessAway, { passive: true });

  // "New messages" pill -- purely ADDITIVE to the auto-follow logic above (its
  // listeners and flag are untouched). Shown only while a reply is streaming
  // and you've scrolled away; tapping it is the explicit way back down
  // (scrollDown(true) clears the flag, exactly like the existing path). The
  // MutationObserver watches streamed text + the .streaming class so the pill
  // retires itself the moment the reply finishes.
  var jump = document.getElementById("jump");
  function refreshJump() {
    jump.classList.toggle("show",
      userAwayFromBottom && !!thread.querySelector(".msg.streaming"));
  }
  ["touchstart", "touchend", "wheel", "scroll"].forEach(function (t) {
    thread.addEventListener(t, refreshJump, { passive: true });
  });
  new MutationObserver(refreshJump).observe(thread, {
    childList: true, subtree: true, characterData: true,
    attributes: true, attributeFilter: ["class"],
  });
  jump.addEventListener("click", function () { scrollDown(true); refreshJump(); });

  input.addEventListener("input", function () {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 110) + "px";
  });
  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); }
  });
  send.addEventListener("click", submit);

  // Send stays LIVE during a run (Steve: "can't send two fast messages" --
  // the disabled send button made the queued-message feature unreachable).
  // gate.js never rejects a concurrent /chat/stream: a second request gets an
  // immediate "status" SSE event and waits in the server's FIFO (chatWaiters),
  // so the client simply opens one stream per message and lets the box order
  // the runs -- 3+ fast sends queue server-side in send order, no client-side
  // queue needed. `pending` counts our in-flight streams: it drives the busy
  // dot and tells a new send it will queue behind our own run (chip it now,
  // and don't show an empty streaming bubble until its turn actually starts).
  var pending = 0;
  function refreshDot() { dot.className = pending > 0 ? "busy" : ""; }
  function chipOn(me) {
    if (me.querySelector(".qchip")) return;
    var c = document.createElement("span");
    c.className = "qchip";
    c.textContent = "queued";
    me.appendChild(c);
  }
  function chipOff(me) {
    var c = me.querySelector(".qchip");
    if (c) me.removeChild(c);
  }

  function submit() {
    var msg = input.value.trim();
    if (!msg) return;
    // Drop the phone keyboard on send (iMessage/WhatsApp convention): without
    // this, the input stays focused after clearing and the keyboard has no
    // reason to close, so the reply renders behind it and has to be dismissed
    // by hand every single turn (Steve, 2026-07-17 -- "interferes with the
    // workflow and reading"). Tapping the input again re-summons it to type
    // the next message; nothing else changes.
    input.blur();
    // "@codex ..." routes ONE turn to that engine without moving the selector
    // (the route hint documents this). A bare "@codex" just moves the selector.
    var turnEng = eng;
    var outMsg = msg;
    if (!LEGAL) {
      var m = /^@(claude|hermes|codex)\b[\s,:-]*/i.exec(msg);
      if (m) {
        turnEng = m[1].toLowerCase();
        outMsg = msg.slice(m[0].length).trim();
        if (!outMsg) { input.value = ""; input.style.height = "auto"; setEngine(turnEng, true); return; }
      }
    }
    input.value = "";
    input.style.height = "auto";
    var me = bubble("me", msg);
    save("me", msg);
    scrollDown(true);
    stream(outMsg, me, turnEng);
  }

  function stream(msg, me, turnEng) {
    pending++;
    refreshDot();
    // Queued behind our own earlier send: mark the bubble immediately. A
    // message queued behind a CRON run is chipped when the server says so
    // (the "status" event below). The reply bubble is created lazily for a
    // queued message -- an empty shimmering bubble that isn't running yet
    // would be a lie; the chip + .sys line carry the waiting state.
    var el = null;
    // startAt: when this reply's bubble (re)opened = when its turn started.
    // Saved as the reply's history timestamp so a reload can re-interleave
    // messages that were sent while an earlier run was still busy.
    var startAt = 0;
    if (pending === 1) el = openReply();
    else chipOn(me);
    function openReply() {
      startAt = Date.now();
      var b = bubble("agent", "", false, 0, turnEng);
      b.classList.add("streaming");
      return b;
    }
    function dropReply() {
      if (!el) return;
      if (el._attr && el._attr.parentNode) el._attr.parentNode.removeChild(el._attr);
      if (el.parentNode) el.parentNode.removeChild(el);
      el = null;
    }
    // This message's turn started (first chunk / done / error): drop the
    // chip and the .sys status line, make sure its reply bubble exists.
    function turnStarted() {
      chipOff(me);
      clearSys();
      if (!el) el = openReply();
      return el;
    }
    var acc = "";
    var qs = "msg=" + encodeURIComponent(msg);
    // Engine + timezone ride the stream URL on gateway boxes only: a legal
    // box's request is byte-identical to the pre-gateway client's, so an
    // older gate there behaves exactly as before.
    if (!LEGAL) qs += "&engine=" + encodeURIComponent(turnEng) + "&tz=" + (-new Date().getTimezoneOffset());
    var es = new EventSource("/chat/stream?" + qs);
    // "status" events (the slot is busy; this message is queued) render as a
    // quiet .sys line -- never a bubble, never saved to history -- and vanish
    // the moment real streaming begins.
    var sys = null;
    function clearSys() {
      if (sys && sys.parentNode) sys.parentNode.removeChild(sys);
      sys = null;
    }
    es.addEventListener("status", function (ev) {
      var meta = {};
      try { meta = JSON.parse(ev.data); } catch (e) {}
      if (!meta.text) return;
      chipOn(me); // the server queued it (e.g. behind a scheduled job)
      // The slot is busy -- this message's turn has NOT started. An empty
      // shimmering reply bubble would be a lie (same rule as the own-queue
      // path above): drop the eager one (and its attribution line);
      // turnStarted() recreates both when the turn is real.
      if (el && !acc) dropReply();
      if (!sys) {
        sys = document.createElement("div");
        sys.className = "sys";
        if (el) thread.insertBefore(sys, el._attr || el);
        else thread.appendChild(sys);
      }
      sys.textContent = meta.text;
      scrollDown();
    });
    es.onmessage = function (ev) {
      var b = turnStarted();
      acc += JSON.parse(ev.data);
      renderMsg(b, acc);
      scrollDown();
    };
    es.addEventListener("done", function (ev) {
      es.close();
      var b = turnStarted();
      b.classList.remove("streaming");
      var meta = {};
      try { meta = JSON.parse(ev.data); } catch (e) {}
      if (meta.error) {
        b.classList.add("err");
        if (!acc) b.textContent = meta.error;
        acc = acc || meta.error;
      }
      if (meta.usage) attrCost(b._attr, meta.usage);
      maybeHandoff(b, acc, turnEng);
      save("agent", acc, meta.error, startAt, LEGAL ? "" : turnEng, meta.usage);
      pending--;
      refreshDot();
      scrollDown();
      refreshUsage();
      if (boardOpen) refreshBoard();
    });
    es.onerror = function () {
      es.close();
      var b = turnStarted();
      b.classList.remove("streaming");
      if (!acc) { b.textContent = "connection lost -- the box may still be working; re-ask to see where it landed"; b.classList.add("err"); }
      save("agent", acc || b.textContent, true, startAt, LEGAL ? "" : turnEng);
      pending--;
      refreshDot();
    };
  }

  // ---- cost strip: today's per-engine spend (GET /usage). Collapsed by
  // default; the whole strip stays hidden until the first byte of real usage
  // exists (a fresh box shows chat, not empty chrome). Refreshed after every
  // finished turn. ----
  var cost = document.getElementById("cost");
  var costhead = document.getElementById("costhead");
  var costbody = document.getElementById("costbody");
  var COST_KEY = "agenthost_cost_open_" + location.hostname;
  var costOpen = false;
  try { costOpen = localStorage.getItem(COST_KEY) === "1"; } catch (e) {}
  // setCostOpen / setBoardOpen keep the two panels an ACCORDION: at most one
  // expanded at a time, so a phone always keeps thread + composer on screen.
  function setCostOpen(v) {
    costOpen = v;
    try { localStorage.setItem(COST_KEY, v ? "1" : "0"); } catch (e) {}
    costbody.hidden = !v;
    costhead.querySelector(".chev").textContent = v ? "▴" : "▾";
    if (v && boardOpen) setBoardOpen(false);
  }
  function engineColor(id) { return ENGINES[id] ? ENGINES[id].color : "var(--ink-3)"; }
  function renderUsage(engines) {
    var ids = ENGINE_IDS.concat(Object.keys(engines).filter(function (k) { return ENGINE_IDS.indexOf(k) === -1; }));
    var rows = [];
    var totalTok = 0, totalUsd = 0;
    ids.forEach(function (id) {
      var u = engines[id];
      if (!u) return;
      var tok = (u.in || 0) + (u.out || 0);
      if (!tok && !u.cost) return;
      totalTok += tok;
      if (Number.isFinite(u.cost)) totalUsd += u.cost;
      rows.push({ id: id, tok: tok, usage: u });
    });
    if (!rows.length) { cost.hidden = true; return; }
    cost.hidden = false;
    costhead.querySelector(".ctotal").textContent = totalUsd > 0 ? fmtUsd(totalUsd) : fmtTok(totalTok) + " tok";
    costhead.querySelector(".chev").textContent = costOpen ? "▴" : "▾";
    var mini = costhead.querySelector(".cmini");
    mini.textContent = "";
    rows.forEach(function (r) {
      var s = document.createElement("span");
      s.style.flex = String(Math.max(r.tok, 1));
      s.style.background = engineColor(r.id);
      mini.appendChild(s);
    });
    costbody.hidden = !costOpen;
    costbody.textContent = "";
    rows.forEach(function (r) {
      var row = document.createElement("div");
      row.className = "erow";
      var d = document.createElement("span");
      d.className = "edot";
      d.style.background = engineColor(r.id);
      row.appendChild(d);
      var nm = document.createElement("span");
      var n1 = document.createElement("span");
      n1.className = "ename";
      n1.textContent = ENGINES[r.id] ? ENGINES[r.id].name : r.id;
      nm.appendChild(n1);
      var n2 = document.createElement("span");
      n2.className = "eacct";
      n2.textContent = ENGINES[r.id] ? ENGINES[r.id].acct : "";
      nm.appendChild(n2);
      row.appendChild(nm);
      var fig = document.createElement("span");
      fig.className = "efig";
      var usd = document.createElement("span");
      usd.className = "usd";
      usd.textContent = fmtUsd(r.usage.cost) || fmtTok(r.tok) + " tok";
      fig.appendChild(usd);
      if (fmtUsd(r.usage.cost)) {
        var tk = document.createElement("span");
        tk.className = "tok";
        tk.textContent = fmtTok(r.tok) + " tok";
        fig.appendChild(tk);
      }
      row.appendChild(fig);
      var bar = document.createElement("span");
      bar.className = "ebar";
      var fill = document.createElement("i");
      fill.style.width = (totalTok ? Math.max(2, Math.round(r.tok / totalTok * 100)) : 0) + "%";
      fill.style.background = engineColor(r.id);
      bar.appendChild(fill);
      row.appendChild(bar);
      costbody.appendChild(row);
    });
  }
  function refreshUsage() {
    if (LEGAL) return;
    fetch("/usage?tz=" + (-new Date().getTimezoneOffset()), { cache: "no-store" })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) { if (d && d.engines) renderUsage(d.engines); })
      .catch(function () {});
  }
  costhead.addEventListener("click", function () {
    setCostOpen(!costOpen);
    if (costOpen) refreshUsage();
  });
  refreshUsage();

  // ---- board peek: the shared kanban every engine coordinates on
  // (GET /board, POST /board/task). Collapsed to one slim row; hidden
  // entirely until the board answers once (no Hermes -> no dead chrome). ----
  var board = document.getElementById("board");
  var boardhead = document.getElementById("boardhead");
  var boardbody = document.getElementById("boardbody");
  var colsEl = document.getElementById("cols");
  var boardnote = document.getElementById("boardnote");
  var addtitle = document.getElementById("addtitle");
  var BOARD_KEY = "agenthost_board_open_" + location.hostname;
  var boardOpen = false;
  try { boardOpen = localStorage.getItem(BOARD_KEY) === "1"; } catch (e) {}
  function setBoardOpen(v) {
    boardOpen = v;
    try { localStorage.setItem(BOARD_KEY, v ? "1" : "0"); } catch (e) {}
    boardbody.hidden = !v;
    boardhead.querySelector(".chev").textContent = v ? "▴" : "▾";
    if (v && costOpen) setCostOpen(false);
  }
  // Both persisted open (or written by an older build): keep the board, the
  // panel nearer the composer -- the accordion invariant holds from load.
  if (costOpen && boardOpen) costOpen = false;
  // "review" appears only when Hermes actually has tasks awaiting review
  // (same only-when-real rule as "blocked").
  var COL_ORDER = ["queued", "running", "review", "done", "blocked"];
  function ownerColor(assignee) {
    var a = String(assignee || "").toLowerCase();
    for (var i = 0; i < ENGINE_IDS.length; i++) {
      if (a.indexOf(ENGINE_IDS[i]) !== -1) return ENGINES[ENGINE_IDS[i]].color;
    }
    return "var(--ink-3)";
  }
  function renderBoard(columns) {
    board.hidden = false;
    var active = (columns.queued || []).length + (columns.running || []).length
      + (columns.review || []).length;
    boardhead.querySelector(".bcount").textContent =
      active ? active + " active" : "empty";
    boardhead.querySelector(".chev").textContent = boardOpen ? "▴" : "▾";
    boardbody.hidden = !boardOpen;
    if (!boardOpen) return;
    colsEl.textContent = "";
    COL_ORDER.forEach(function (name) {
      var tasks = columns[name] || [];
      if ((name === "blocked" || name === "review") && !tasks.length) return; // only when real
      var col = document.createElement("div");
      col.className = "col";
      var h = document.createElement("div");
      h.className = "col-h";
      h.appendChild(document.createTextNode(name + " "));
      var n = document.createElement("span");
      n.className = "n";
      n.textContent = String(tasks.length);
      h.appendChild(n);
      col.appendChild(h);
      tasks.slice(0, 8).forEach(function (t) {
        var card = document.createElement("div");
        card.className = "bcard";
        card.style.borderLeftColor = ownerColor(t.assignee);
        var tt = document.createElement("div");
        tt.className = "t";
        tt.textContent = String(t.title || t.name || t.id || "task");
        card.appendChild(tt);
        if (t.assignee) {
          var o = document.createElement("span");
          o.className = "o";
          o.textContent = String(t.assignee);
          card.appendChild(o);
        }
        col.appendChild(card);
      });
      colsEl.appendChild(col);
    });
  }
  function refreshBoard() {
    if (LEGAL) return;
    fetch("/board", { cache: "no-store" })
      .then(function (r) { return r.ok ? r.json() : null; })
      // available:false = the gate could not run the Hermes CLI (not installed
      // on this box) -- keep the chrome hidden rather than show a board that
      // can never hold a task. Older gates omit the flag; treat that as available.
      .then(function (d) { if (d && d.columns && d.available !== false) renderBoard(d.columns); })
      .catch(function () {});
  }
  boardhead.addEventListener("click", function () {
    setBoardOpen(!boardOpen);
    if (boardOpen) refreshBoard();
  });
  function addTask() {
    var title = addtitle.value.trim();
    if (!title) return;
    boardnote.className = "";
    boardnote.textContent = "adding…";
    fetch("/board/task", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title: title }),
    }).then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
      .then(function (res) {
        if (!res.ok) {
          boardnote.className = "err";
          boardnote.textContent = (res.d && res.d.error) || "could not create the task";
          return;
        }
        addtitle.value = "";
        boardnote.textContent = "";
        refreshBoard();
      })
      .catch(function () {
        boardnote.className = "err";
        boardnote.textContent = "could not reach the board";
      });
  }
  document.getElementById("addgo").addEventListener("click", addTask);
  addtitle.addEventListener("keydown", function (e) {
    if (e.key === "Enter") { e.preventDefault(); addTask(); }
  });
  refreshBoard();

  // ---- Phone-keyboard inset tracking (Steve, 2026-07-17: keyboard covering
  // the reply forced a manual dismiss every turn). Mirrors appshell.js's
  // syncKbInset for the terminal's key bar: when the on-screen keyboard opens,
  // visualViewport shrinks but the body (100dvh, fixed to the LAYOUT viewport)
  // does not, so content silently slides behind the keyboard. Mirror the
  // occluded height into --ah-kb-inset; body's padding-bottom (above) then
  // makes real room. input.blur() on send (see submit()) means this mostly
  // matters while actively typing -- but it also covers the case where the
  // keyboard is still animating closed as the reply starts streaming in.
  // No-op on browsers without visualViewport (desktop, older WebViews).
  if (window.visualViewport) {
    var syncKbInset = function () {
      var vv = window.visualViewport;
      var occluded = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      // <60px is browser chrome jitter (address bar show/hide), not a keyboard.
      document.documentElement.style.setProperty("--ah-kb-inset", (occluded > 60 ? occluded : 0) + "px");
    };
    window.visualViewport.addEventListener("resize", syncKbInset);
    window.visualViewport.addEventListener("scroll", syncKbInset);
  }

  // ---- Voice input (feature 2). Hidden entirely on unsupported browsers. ----
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var mic = document.getElementById("mic");
  if (!SR) { mic.style.display = "none"; }
  else {
    var rec = null, listening = false;
    mic.addEventListener("click", function () {
      if (listening) { if (rec) rec.stop(); return; }
      rec = new SR();
      rec.continuous = false;
      rec.interimResults = true;
      rec.lang = navigator.language || "en-US";
      var base = input.value;
      rec.onresult = function (e) {
        var txt = "";
        for (var i = 0; i < e.results.length; i++) txt += e.results[i][0].transcript;
        input.value = base + txt;
        input.dispatchEvent(new Event("input"));
      };
      rec.onend = function () { listening = false; mic.classList.remove("on"); };
      rec.onerror = function () { listening = false; mic.classList.remove("on"); };
      try { rec.start(); listening = true; mic.classList.add("on"); } catch (e) {}
    });
  }

  // ---- Web Push enable control (feature 3). Bell hidden if unsupported. -----
  var bell = document.getElementById("bell");
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(function () {});
  if (!("serviceWorker" in navigator && "PushManager" in window && "Notification" in window)) {
    bell.style.display = "none";
  } else {
    reflectPerm();
    bell.addEventListener("click", enablePush);
  }
  function reflectPerm() {
    bell.classList.toggle("on", Notification.permission === "granted");
    bell.classList.toggle("off", Notification.permission === "denied");
  }
  function u8(b) {
    var pad = "=".repeat((4 - b.length % 4) % 4);
    var s = (b + pad).replace(/-/g, "+").replace(/_/g, "/");
    var raw = atob(s), arr = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }
  function enablePush() {
    Notification.requestPermission().then(function (perm) {
      reflectPerm();
      if (perm !== "granted") return;
      return navigator.serviceWorker.ready.then(function (reg) {
        return fetch("/push/key").then(function (r) { return r.json(); }).then(function (d) {
          if (!d || !d.key) throw new Error("push not configured"); // /push/key 503
          return reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: u8(d.key) });
        }).then(function (sub) {
          return fetch("/push/subscribe", { method: "POST",
            headers: { "Content-Type": "application/json" }, body: JSON.stringify(sub) });
        });
      });
    }).catch(function () {});
  }
})();
</script>
</body>
</html>
